# OpenOCD config for Pi 5 GPIO bit-bang SWD → STM32F103RCT6
# Wiring:
#   Pi GPIO24 (Pin 18) → SWDIO
#   Pi GPIO25 (Pin 22) → SWCLK
#   Pi GND    (Pin 20) → GND

adapter driver linuxgpiod
linuxgpiod gpiochip 4

# SWD signal mapping to Pi 5 GPIO
adapter gpio swdio 24 -chip 4
adapter gpio swclk 25 -chip 4

# SWD transport (not JTAG)
transport select swd

# Slow speed for reliable bit-bang over jumper wires
adapter speed 100

# STM32F1x target
source [find target/stm32f1x.cfg]

# Don't reset on connect — we want to inspect the running state
reset_config none
