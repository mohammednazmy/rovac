# Nav2 Parameters for Yahboom G1 Tank
# Configured for indoor navigation with RPLIDAR C1 (12m, 10Hz, 500pts/scan)

amcl:
  ros__parameters:
    use_sim_time: false
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    base_frame_id: "base_link"
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false
    global_frame_id: "map"
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0
    laser_max_range: 12.0
    laser_min_range: 0.05
    laser_model_type: "likelihood_field"
    max_beams: 180
    max_particles: 2000
    min_particles: 500
    odom_frame_id: "odom"
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    resample_interval: 1
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    save_pose_rate: 0.5
    sigma_hit: 0.2
    tf_broadcast: true
    transform_tolerance: 1.0
    update_min_a: 0.2
    update_min_d: 0.25
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.5
    z_short: 0.05
    scan_topic: scan

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    # Keep at top level too (harmless, used by some Nav2 versions).
    default_nav_to_pose_bt_xml: "/opt/homebrew/Caskroom/miniforge/base/envs/ros_jazzy/share/nav2_bt_navigator/behavior_trees/navigate_to_pose_w_replanning_and_recovery.xml"
    default_nav_through_poses_bt_xml: "/opt/homebrew/Caskroom/miniforge/base/envs/ros_jazzy/share/nav2_bt_navigator/behavior_trees/navigate_through_poses_w_replanning_and_recovery.xml"
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    # Nav2 Jazzy actually reads these from INSIDE the navigator plugin
    # blocks, not from the top-level bt_navigator params. Explain
    # carefully:
    #   - NavigateToPose worked earlier when set only at top level — so
    #     that navigator has a fallback default built into the plugin.
    #   - NavigateThroughPoses rejects goals immediately when its BT
    #     xml isn't found. Its fallback doesn't seem to resolve either
    #     the package:// URI path or the top-level param reliably in
    #     our conda install. Solution: put the path HERE too, directly
    #     on the plugin config where the navigator definitely reads it.
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
      default_nav_to_pose_bt_xml: "/opt/homebrew/Caskroom/miniforge/base/envs/ros_jazzy/share/nav2_bt_navigator/behavior_trees/navigate_to_pose_w_replanning_and_recovery.xml"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"
      default_nav_through_poses_bt_xml: "/opt/homebrew/Caskroom/miniforge/base/envs/ros_jazzy/share/nav2_bt_navigator/behavior_trees/navigate_through_poses_w_replanning_and_recovery.xml"

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 10.0
    # Below this velocity, the controller treats the robot as stopped.
    # Previously 0.25 m/s (= robot's max!) which made the BT think the
    # robot was permanently stopped. 0.02 m/s is a realistic "stopped".
    min_x_velocity_threshold: 0.02
    min_y_velocity_threshold: 0.5  # diff-drive, y-velocity ignored
    min_theta_velocity_threshold: 0.05
    failure_tolerance: 0.3
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    # More patient progress checker — our tank moves slowly, especially
    # when starting from rest through stiction. 10s was triggering false
    # failures mid-turn. 30s with a smaller required_radius gives the
    # robot time to execute initial turn + first straight segment.
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.15
      movement_time_allowance: 30.0

    general_goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.35  # a bit looser — tank yaw control is scrubby

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: true
      # Dynamics updated 2026-04-22 from Phase 3.3 bench measurements:
      # loaded max ≈ 0.30 m/s at PWM 255; reliable sustained ≈ 0.25 m/s.
      # Angular: encoder-derived saturates near 3.0 rad/s, body rotation
      # slower due to track scrub. 2.0 rad/s is a responsive practical cap.
      # Linear accel measured ~0.4 m/s² (0 → 0.15 m/s rise ≈ 0.4s); capping
      # planner at 1.0 m/s² keeps generated trajectories achievable.
      #
      # 2026-04-23 live-tuning for jitter fix:
      #   - min_vel_x/min_speed_theta raised above ESP32 stiction thresholds
      #     so DWB never commands a sub-stiction twitch the PID can't execute
      #   - trans_stopped_velocity lowered so state machine reads motion
      #     correctly (was set to 0.25 = robot max, which was nonsense)
      #   - RotateToGoal.slowing_factor lowered from 5→1.5 to keep turn-in-
      #     place commands above stiction near the goal heading
      min_vel_x: 0.0
      min_vel_y: 0.0
      max_vel_x: 0.25
      max_vel_y: 0.0
      max_vel_theta: 2.0
      # Floor for commanded motion — prevents DWB from issuing twitchy
      # sub-stiction commands that the ESP32 PID can't execute.
      # When DWB wants to move, it commits to at least these magnitudes.
      min_speed_xy: 0.05          # 5 cm/s floor when moving (was 0)
      max_speed_xy: 0.25
      min_speed_theta: 0.4        # ~23°/s floor when turning (was 0)
      acc_lim_x: 1.0
      acc_lim_y: 0.0
      acc_lim_theta: 3.2
      decel_lim_x: -1.0
      decel_lim_y: 0.0
      decel_lim_theta: -3.2
      vx_samples: 20
      vy_samples: 5
      vtheta_samples: 20
      sim_time: 1.7
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.2
      xy_goal_tolerance: 0.25
      # Was 0.25 (= max vel!) which made state machine think robot was
      # always stopped. 0.02 m/s is a realistic "stopped" for this tank.
      trans_stopped_velocity: 0.02
      short_circuit_trajectory_evaluation: true
      stateful: true
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      BaseObstacle.scale: 0.02
      PathAlign.scale: 32.0
      PathAlign.forward_point_distance: 0.1
      GoalAlign.scale: 24.0
      GoalAlign.forward_point_distance: 0.1
      PathDist.scale: 32.0
      GoalDist.scale: 24.0
      RotateToGoal.scale: 32.0
      # Was 5.0 → divided turn rate by 5 near goal → sub-stiction commands.
      # 1.5 keeps slight deceleration but stays above motor minimum speed.
      RotateToGoal.slowing_factor: 1.5
      RotateToGoal.lookahead_time: -1.0

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: false
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      robot_radius: 0.15
      plugins: ["voxel_layer", "inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: true
        publish_voxel_map: true
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 8.0
          raytrace_min_range: 0.05
          obstacle_max_range: 6.0
          obstacle_min_range: 0.05
      static_layer:
        map_subscribe_transient_local: true
      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: false
      robot_radius: 0.15
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 10.0
          raytrace_min_range: 0.05
          obstacle_max_range: 8.0
          obstacle_min_range: 0.05
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55
      always_send_full_costmap: true

planner_server:
  ros__parameters:
    expected_planner_frequency: 20.0
    use_sim_time: false
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: true

behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.1
    use_sim_time: false
    simulate_ahead_time: 2.0
    max_rotational_vel: 2.0      # matches FollowPath.max_vel_theta (2026-04-22)
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2

waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    # Mirrors FollowPath limits (Phase 3.3 measured dynamics, 2026-04-22)
    max_velocity: [0.25, 0.0, 2.0]
    min_velocity: [-0.25, 0.0, -2.0]
    max_accel: [1.0, 0.0, 3.2]
    max_decel: [-1.0, 0.0, -3.2]
    odom_topic: "odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0
