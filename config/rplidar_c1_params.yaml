# RPLIDAR C1 parameters for rplidar_ros2_driver (frozenreboot)
# DTOF LIDAR: 12m range, ~10Hz, 5KHz sample rate
# USB via CP2102N → /dev/rplidar_c1, baud 460800
rplidar_node:
  ros__parameters:
    serial_port: "/dev/rplidar_c1"
    serial_baudrate: 460800
    frame_id: "laser_frame"
    angle_compensate: true
    scan_mode: "Standard"
    rpm: 0
    interpolated_rays: false
    computed_ray_count: 500
    use_intensities: false
    max_distance: 0.0
    dummy_mode: false
    publish_tf: false
    qos_policy: "sensor_data"
    max_retries: 3
    angle_offset: 0.0
    publish_point_cloud: false
    intensities_as_angles: false
